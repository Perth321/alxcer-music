name: Alxcer Music Bot

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for starting the bot"
        required: false
        default: "Manual start"
  schedule:
    - cron: "0 */5 * * *"

jobs:
  run-bot:
    name: Run Alxcer Music Bot
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: bot/package.json

      - name: Install yt-dlp
        run: |
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          yt-dlp --version

      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          ffmpeg -version | head -1

      - name: Install bot dependencies
        working-directory: bot
        run: npm install

      - name: Start Alxcer Music Bot
        working-directory: bot
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          PREFIX: "!"
        run: |
          echo "🎵 Starting Alxcer Music Bot..."
          node index.js

      - name: Auto-restart via GitHub API
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_PERSONAL_ACCESS_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          echo "🔄 Bot stopped. Restarting via GitHub API..."
          curl -s -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/$REPO/actions/workflows/alxcer-music-bot.yml/dispatches" \
            -d '{"ref":"main","inputs":{"reason":"Auto-restart after bot stopped"}}'
          echo "✅ Restart triggered!"
